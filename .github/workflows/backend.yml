name: backend

# Requirements S6: linters + tests run on every pull request as a mandatory check.
on:
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"
  push:
    branches: [main]
    paths:
      - "backend/**"

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: backend/go.sum

      - name: gofmt
        working-directory: backend
        run: |
          out="$(gofmt -l .)"
          if [ -n "$out" ]; then
            echo "::error::gofmt would reformat the following files:"; echo "$out"
            exit 1
          fi

      - name: go vet
        working-directory: backend
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v2.12.2
          working-directory: backend

      - name: go test
        working-directory: backend
        run: go test ./... -race -coverprofile=coverage.out

      - name: coverage summary
        working-directory: backend
        run: go tool cover -func=coverage.out | tail -1