name: backend

# Requirements S6: linters + tests run on every pull request as a mandatory check.
on:
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"
  push:
    branches: [main]
    paths:
      - "backend/**"
  workflow_dispatch:
    inputs:
      skip_checks:
        description: "Skip lint + test (re-deploy only)"
        type: boolean
        default: false
        required: false

permissions:
  contents: read
  packages: write  # needed to push to GHCR

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: backend/go.sum

      - name: gofmt
        working-directory: backend
        run: |
          out="$(gofmt -l .)"
          if [ -n "$out" ]; then
            echo "::error::gofmt would reformat the following files:"; echo "$out"
            exit 1
          fi

      - name: go vet
        working-directory: backend
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2
          working-directory: backend

      - name: go test
        working-directory: backend
        run: go test ./... -race -coverprofile=coverage.out

      - name: coverage summary
        working-directory: backend
        run: go tool cover -func=coverage.out | tail -1

  deploy:
    if: >
      github.ref == 'refs/heads/main' && (
        github.event_name == 'push' ||
        github.event_name == 'workflow_dispatch'
      )
    needs: lint-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag
        id: image
        run: |
          REPO="${{ github.repository }}"
          echo "tag=ghcr.io/${REPO,,}/backend:latest" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: backend
          push: true
          tags: ${{ steps.image.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Copy compose and nginx configs to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          source: "backend/docker-compose.prod.yml,backend/nginx"
          target: "/opt/timeoflife"
          strip_components: 1

      - name: Deploy to VM
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /opt/timeoflife

            # Back up the current .env before regenerating (recoverable, not authoritative).
            [ -f .env ] && cp .env ".env.bak.$(date +%Y%m%d-%H%M%S)" || true

            # Regenerate .env from GitHub Actions secrets. This is what makes redeploy
            # self-healing: the secrets' source of truth is GitHub Actions, and every
            # deploy rewrites a correct, complete .env on the VM.
            # Quoted heredoc: GitHub substitutes ${{ secrets.* }} literals; the remote
            # shell does no expansion, so values with $ or ` survive verbatim.
            cat > .env <<'ENVEOF'
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            EMAIL_BACKEND=${{ secrets.EMAIL_BACKEND }}
            AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}
            AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}
            AWS_REGION=${{ secrets.AWS_REGION }}
            SES_FROM=${{ secrets.SES_FROM }}
            APPLE_CLIENT_ID=${{ secrets.APPLE_CLIENT_ID }}
            ENVEOF
            chmod 600 .env

            # Validate before bringing services up — fail loudly in CI instead of
            # crashlooping on the VM with empty/missing config.
            set -a; . ./.env; set +a
            : "${DB_PASSWORD:?secret DB_PASSWORD is empty}"
            : "${JWT_SECRET:?secret JWT_SECRET is empty}"
            [ "${#JWT_SECRET}" -ge 32 ] || { echo "JWT_SECRET must be at least 32 bytes"; exit 1; }
            : "${EMAIL_BACKEND:?secret EMAIL_BACKEND is empty}"
            case "$EMAIL_BACKEND" in
              console|mailgun|ses) ;;
              *) echo "EMAIL_BACKEND '$EMAIL_BACKEND' is not one of console|mailgun|ses"; exit 1 ;;
            esac
            if [ "$EMAIL_BACKEND" = ses ]; then
              : "${AWS_ACCESS_KEY_ID:?AWS_ACCESS_KEY_ID required when EMAIL_BACKEND=ses}"
              : "${AWS_SECRET_ACCESS_KEY:?AWS_SECRET_ACCESS_KEY required when EMAIL_BACKEND=ses}"
              : "${AWS_REGION:?AWS_REGION required when EMAIL_BACKEND=ses}"
              : "${SES_FROM:?SES_FROM required when EMAIL_BACKEND=ses}"
            fi

            # Use the production compose file (local .env is read from this cwd).
            cp docker-compose.prod.yml docker-compose.yml

            # Log in to GHCR
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull the new image
            docker compose pull backend

            # Recreate all services
            docker compose up -d

            # Clean up old images
            docker image prune -f

            echo "Deployment complete"
