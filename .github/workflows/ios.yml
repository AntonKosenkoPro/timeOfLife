name: ios

# Requirements S6: linters + tests run on every pull request as a mandatory check.
on:
  pull_request:
    paths:
      - "ios/**"
      - ".github/workflows/ios.yml"
  push:
    branches: [main]
    paths:
      - "ios/**"

permissions:
  contents: read

jobs:
  lint-build-test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install xcodegen + swiftlint
        run: brew install xcodegen swiftlint

      - name: Generate Xcode project
        working-directory: ios/TimeOfLife
        run: xcodegen generate

      - name: SwiftLint
        working-directory: ios/TimeOfLife
        run: swiftlint lint --strict

      - name: Resolve simulator destination
        id: sim
        working-directory: ios/TimeOfLife
        run: |
          NAME=$(xcrun simctl list devices available -j | \
            python3 -c 'import json,sys
          ds=json.load(sys.stdin)["devices"]
          print(next(d["name"] for rt in ds for d in ds[rt]
                     if "iPhone" in d["name"] and d.get("isAvailable")))')
          echo "name=$NAME" >> "$GITHUB_OUTPUT"

      - name: Build
        working-directory: ios/TimeOfLife
        run: |
          set -o pipefail
          xcodebuild -scheme TimeOfLife \
            -destination "platform=iOS Simulator,name=${{ steps.sim.outputs.name }},OS=latest" \
            build | xcpretty

      - name: Test
        working-directory: ios/TimeOfLife
        run: |
          set -o pipefail
          xcodebuild -scheme TimeOfLife \
            -destination "platform=iOS Simulator,name=${{ steps.sim.outputs.name }},OS=latest" \
            test | xcpretty