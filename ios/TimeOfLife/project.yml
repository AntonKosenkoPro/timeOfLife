name: TimeOfLife
options:
  bundleIdPrefix: com.antonkosenko
  deploymentTarget:
    iOS: "15.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  groupSortPosition: top
settings:
  base:
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    CODE_SIGNING_REQUIRED: NO
    CODE_SIGN_IDENTITY: ""
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    IPHONEOS_DEPLOYMENT_TARGET: "15.0"
    SWIFT_STRICT_CONCURRENCY: complete
configs:
  Debug: debug
  Release: release
configFiles:
  Debug: TimeOfLife/Configuration/Config.xcconfig
  Release: TimeOfLife/Configuration/Config.xcconfig
targets:
  TimeOfLife:
    type: application
    platform: iOS
    deploymentTarget: "15.0"
    sources:
      - path: TimeOfLife
        excludes:
          - "Configuration/Config.xcconfig"
          - "Configuration/Info.plist"
      - path: TimeOfLife/Configuration/Config.xcconfig
        type: file
        buildPhase: none
      - path: TimeOfLife/Localization/en.lproj
      - path: TimeOfLife/Localization/ru.lproj
    resources:
      - TimeOfLife/Resources/Assets.xcassets
    info:
      path: TimeOfLife/Configuration/Info.plist
      properties:
        CFBundleDisplayName: Time of Life
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        LSRequiresIPhoneOS: true
        UIApplicationSupportsIndirectInputEvents: true
        UILaunchScreen:
          UIColorName: BackgroundPrimary
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIRequiredDeviceCapabilities:
          - armv7
        CFBundleURLTypes:
          - CFBundleURLName: com.antonkosenko.timeoflife.deeplink
            CFBundleURLSchemes:
              - timeoflife
        NSAppTransportSecurity:
          NSExceptionDomains:
            127.0.0.1:
              NSExceptionAllowsInsecureHTTPLoads: true
              NSIncludesSubdomains: false
        UIUserInterfaceStyle: Automatic
        API_BASE_URL: "$(API_BASE_URL)"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.antonkosenko.timeoflife
        INFOPLIST_FILE: TimeOfLife/Configuration/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentPrimary
        ENABLE_PREVIEWS: YES
        SWIFT_EMIT_LOC_STRINGS: NO
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: NO
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
    dependencies: []
  TimeOfLifeTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "15.0"
    sources:
      - TimeOfLifeTests
    dependencies:
      - target: TimeOfLife
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.antonkosenko.timeoflife.tests
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/TimeOfLife.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/TimeOfLife"
        GENERATE_INFOPLIST_FILE: YES
