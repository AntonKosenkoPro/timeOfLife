# Production docker-compose file for Time of Life backend.
# Used by the CI/CD pipeline to deploy to the GCP VM.
# Environment variables are loaded from .env (or set in the CI/CD environment).

services:
  postgres:
    image: postgres:15-alpine
    restart: always
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: timeoflife
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/antonkosenkopro/timeoflife/backend:latest
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:${DB_PASSWORD}@postgres:5432/timeoflife?sslmode=disable
      JWT_SECRET: ${JWT_SECRET}
      EMAIL_BACKEND: ${EMAIL_BACKEND:-console}
      PORT: "8080"
      OTP_EXPIRY: ${OTP_EXPIRY:-10m}
      OTP_MAX_ATTEMPTS: ${OTP_MAX_ATTEMPTS:-5}
      OTP_EMAIL_TEMPLATE: ${OTP_EMAIL_TEMPLATE:-}
      OTP_EMAIL_HTML_TEMPLATE: ${OTP_EMAIL_HTML_TEMPLATE:-}
      MAILGUN_DOMAIN: ${MAILGUN_DOMAIN:-}
      MAILGUN_API_KEY: ${MAILGUN_API_KEY:-}
      MAILGUN_FROM: ${MAILGUN_FROM:-}
      # AWS SES (real mail sender). Required when EMAIL_BACKEND=ses.
      # Set EMAIL_BACKEND=ses only after SES is verified in production.
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_REGION: ${AWS_REGION:-}
      SES_FROM: ${SES_FROM:-}
    expose:
      - "8080"

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend

volumes:
  pgdata:

networks:
  default:
    name: timeoflife-net
    external: true
