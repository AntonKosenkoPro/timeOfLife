services:
  postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: tol
      POSTGRES_PASSWORD: tol
      POSTGRES_DB: tol
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tol -d tol"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata: